services:
  - type: web
    name: mummy-roulette
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: echo "Static files are ready"
    staticPublishPath: ./
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
